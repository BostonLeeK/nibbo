name: home-crm

services:
  app:
    image: home-crm:latest
    container_name: homecrm
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - /volume1/docker/home-crm/postgres:/var/lib/postgresql/data
      - /volume1/docker/home-crm/public/uploads:/app/public/uploads

volumes:
  postgres_data:
    name: home_crm_postgres_data
  recipe_uploads:
    name: home_crm_recipe_uploads
