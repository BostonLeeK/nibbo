services:
  app:
    image: home-crm:latest
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AUTH_SECRET: ${NEXTAUTH_SECRET}
    container_name: homecrm
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-to-a-random-secret}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-to-a-random-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      AUTH_ALLOWED_EMAILS: ${AUTH_ALLOWED_EMAILS:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - recipe_uploads:/app/public/uploads

volumes:
  postgres_data:
  recipe_uploads:
